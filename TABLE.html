<!DOCTYPE html>
<html>

<head>
   <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Practice Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f4f4;
           
            
        }

        /* NAVBAR */
        nav {
            background: #2e7d32;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        /* HEADER */
        .header {
            text-align: center;
            background: white;
            padding: 30px;
            margin: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        .header h1 {
            color: #2e7d32;
        }

        /* TABLE */
        .table-box {
            width: 80%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px gray;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #2e7d32;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f1f1f1;
        }

        /* BUTTON */
        button {
            background: #ff5722;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
        }

        button:hover {
            background: #e64a19;
        }
    </style>
</head>

<body>
    <nav> <a href="#">Home</a> <a href="#">About</a> <a href="#">News</a> <a href="#">Contact</a> </nav>
    <div class="header">
        <h1>Welcome to HTML and CSS</h1>
        <p>Practice every day to become a web developer</p>
    </div>
    <div class="table-box">
        <table>
            <tr>
                <th>First Name</th>
                <th>Second Name</th>
                <th>Age</th>
                <th>Country</th>
            </tr>
            <tr>
                <td>Sakariye</td>
                <td>Ali</td>
                <td>20</td>
                <td>Somalia</td>
            </tr>
            <tr>
                <td>Hassan</td>
                <td>Kaafi</td>
                <td>35</td>
                <td>Somalia</td>
            </tr>
        </table> <br> <button>Read More</button>
    </div>
</body>

</html>
