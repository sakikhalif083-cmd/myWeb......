<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgba(199, 7, 199, 0.678);
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        #wrapper{
            width: 80%;
            padding: 10px;
            margin: auto;
            border: 2px solid rgb(81, 30, 24);
            border-radius: 15px;
        }
        header{
            background-color: rgb(255, 174, 0);
            color: rgba(97, 117, 7, 0.916);
            font-size: 40px;
            padding: 10px;
            text-align: center;
        }
        nav{
            float: left;
            width: 150px;
            padding: 10px;
            background-color: cadetblue;
            color: white;
            min-height: 300px;
        }
        main{
            margin-left: 170px;
            padding: 10px;
            background-color: rgb(160, 95, 131);
            color: white;
            min-height: 300px;
        }
        footer{
            background-color: coral;
            text-align: center;
            padding: 25px;
            clear: both;
        }

        nav a{
            text-decoration: none;
            display: block;
            margin-top: 10px;

        &:hover{
            background-color: blanchedalmond;
            padding: 10px;
        }

        }
    </style>
</head>
<body>
    <div id="wrapper">
        <!-- Header -->
         <header>
            Welcome to the school
         </header>
         <!-- Nav -->
          <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">News</a>
            <a href="#">Contact us</a>
          </nav>
          <!-- Main -->
           <main>
            <h1>Welcome to the School managemet system</h1>
            <p>THis is were students can manage</p>
            <p>Best System management</p>
            <p>make sure to use as right way.....</p>
           </main>
           <!-- Footer -->
           <footer>
            All Copyright recieved by CA252
           </footer>
    </div>
</body>
</html>
