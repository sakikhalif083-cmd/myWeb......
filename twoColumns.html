<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Two Colums using HTML and CSS</title>
    <style>
        body{
            background-color: cornflowerblue;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;

        }
        #wrapper{
            width: 80%;
            padding: 10px;
            margin: auto;
            border: 3px inset;
            border-radius: 10px;
            background-color: azure;
            color: black;
        }
        header{
            background-color: rgb(116, 45, 3);
            padding: 10px;
            text-align: center;
            font-size: 30px;
            color: aliceblue;
        }
        nav{
            float: left;
            width: 150px;
            background-color: rgb(135, 10, 10);
            padding: 5px;
            min-height: 300px;
        }
        nav a{
            text-decoration: none;
            display: block;
            padding: 5px;

        &:hover{
            background-color: rgb(89, 164, 74);
            color: black;
            padding: 3px;
        }
        }
        main{
            background-color: rgb(0, 130, 119);
            padding: 5px;
            margin-left: 160px;
            min-height: 300px;
            color: white;
        }
        footer{
            background-color: rgb(48, 0, 68);
            padding: 10px;
            text-align: center;
            color: white;
            
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <!-- header -->
         <header>Welcome to CA252</header>
         <!-- Nav -->
          <nav>
            <a href="#">Home</a>
            <a href="#">about</a>
            <a href="#">News</a>
            <a href="#">Contact</a>
          </nav>
          <!-- Main -->
           <main>
            <h1>Welcome to Admin page</h1>
            <p>You are using the System</p>
            <p>Do not share you email and password to any</p>
           </main>
           <!-- footer -->
            <footer>
                <p>All Copyright recieved by CA252</p>
            </footer>
    </div>
</body>
</html>
